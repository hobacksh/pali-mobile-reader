<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tipitaka Mobile Reader</title>
  <style>
    :root {
      --bg: #f6f1e6;
      --paper: #fffaf1;
      --ink: #1c1f1a;
      --muted: #636d5b;
      --line: #d8cfbf;
      --accent: #2c6e49;
      --accent-soft: #dceadf;
      --shadow: 0 10px 24px rgba(26, 34, 22, 0.12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
    body {
      font-family: "Maitree", "Georgia", serif;
      background:
        radial-gradient(circle at -10% 0%, #ece4d5 0%, transparent 45%),
        radial-gradient(circle at 110% 20%, #d8ebde 0%, transparent 40%),
        var(--bg);
      min-height: 100dvh;
    }
    .app { width: min(100%, 820px); margin: 0 auto; padding: 14px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(150deg, #fffefb, #f6f0e1);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }
    body.fullscreen-lock { overflow: hidden; }
    .panel.fullscreen-mode {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      margin: 0;
      border-radius: 0;
      border: 0;
      box-shadow: none;
      padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }
    .panel.fullscreen-mode .nav-pane { display: none !important; }
    .panel.fullscreen-mode #navToggleBtn { display: none; }
    .panel.fullscreen-mode .file-meta { display: none; }
    .panel.fullscreen-mode .layout {
      margin-top: 10px;
      flex: 1;
      min-height: 0;
      display: block;
    }
    .panel.fullscreen-mode .layout > div {
      height: 100%;
      min-height: 0;
    }
    .panel.fullscreen-mode .reader {
      height: 100%;
      min-height: 0;
      max-height: none;
      font-size: clamp(20px, 4.8vw, 27px);
      line-height: 1.9;
      padding: 16px;
    }
    .eyebrow {
      margin: 0;
      font-family: "Monda", "Trebuchet MS", sans-serif;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 12px;
    }
    h1 { margin: 6px 0 0; font-size: 30px; line-height: 1.15; }
    .sub { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .lang-btn {
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 12px;
      text-align: left;
      padding: 12px;
      color: inherit;
      min-height: 72px;
    }
    .lang-btn:active { transform: translateY(1px); }
    .lang-name { margin: 0; font-size: 16px; font-weight: 700; }
    .lang-sample { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

    .bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .pill {
      border: 1px solid var(--line);
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-family: "Monda", "Trebuchet MS", sans-serif;
      cursor: pointer;
    }
    .toc-wrap {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .toc-toggle {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #eee6d6;
      background: #f7f3e8;
      padding: 11px 12px;
      text-align: left;
      font-family: "Monda", "Trebuchet MS", sans-serif;
      font-size: 13px;
      color: #314231;
      cursor: pointer;
    }
    .toc {
      max-height: 34dvh;
      overflow: auto;
      padding: 6px 0;
    }
    .toc-section { border-bottom: 0; margin: 0; padding: 0; }
    .toc-head {
      width: 100%;
      border: 0;
      background: transparent;
      padding: 5px 10px 5px 26px;
      text-align: left;
      font-family: "Monda", "Trebuchet MS", sans-serif;
      font-size: 12px;
      color: #2d342c;
      cursor: pointer;
      list-style: none;
      position: relative;
    }
    .toc-head::-webkit-details-marker { display: none; }
    .toc-head::before {
      content: "▸";
      position: absolute;
      left: 8px;
      top: 7px;
      font-size: 11px;
      color: #6d745f;
    }
    .toc-section[open] > .toc-head::before { content: "▾"; }
    .toc-files { border-top: 1px dashed #eee6d6; }
    .toc-children {
      margin-left: 14px;
      border-left: 1px dotted #b8b09d;
      padding-left: 6px;
    }

    .list {
      max-height: 26dvh;
      overflow: auto;
      background: #fffcf6;
    }
    .file-btn {
      width: 100%;
      text-align: left;
      border: 0;
      border-bottom: 0;
      background: transparent;
      padding: 4px 10px 4px 30px;
      font-size: 12px;
      color: #2f3730;
      font-family: "Monda", "Trebuchet MS", sans-serif;
      position: relative;
    }
    .file-btn::before {
      content: "📄";
      position: absolute;
      left: 12px;
      top: 4px;
      font-size: 12px;
      opacity: .9;
    }
    .file-btn.active {
      background: #e8f1e6;
      color: #1f4d33;
      font-weight: 700;
    }
    .file-btn.ko-full::after,
    .file-btn.ko-partial::after {
      content: "KO";
      margin-left: 8px;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      vertical-align: middle;
    }
    .file-btn.ko-full::after {
      border: 1px solid #14532d;
      background: #dcfce7;
      color: #14532d;
    }
    .file-btn.ko-partial::after {
      border: 1px solid #92400e;
      background: #fef3c7;
      color: #92400e;
    }
    .file-btn:last-child { border-bottom: 0; }

    .reader {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      padding: 12px;
      min-height: 42dvh;
      max-height: 54dvh;
      overflow: auto;
      font-family: "Times Ext Roman", "Indic Times", "Doulos SIL", Tahoma, "Arial Unicode MS", Gentium, serif;
      font-size: 12pt;
      line-height: 1.6;
      width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .reader p {
      border-top: 0;
      border-bottom: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      margin-bottom: 0.5cm;
    }
    .reader .note { color: blue; }
    .reader .bld { font-weight: bold; }
    .reader .paranum { font-weight: bold; }
    .reader .indent { font-size: 12pt; text-indent: 2em; margin-left: 3em; }
    .reader .bodytext { font-size: 12pt; text-indent: 2em; }
    .reader .hangnum { font-size: 12pt; margin-bottom: -0.75cm; text-indent: 2em; }
    .reader .centered { font-size: 12pt; text-align: center; }
    .reader .unindented { font-size: 12pt; }
    .reader .book { font-size: 21pt; text-align: center; font-weight: bold; }
    .reader .chapter { font-size: 18pt; text-align: center; font-weight: bold; }
    .reader .nikaya { font-size: 24pt; text-align: center; font-weight: bold; }
    .reader .title { font-size: 12pt; text-align: center; font-weight: bold; }
    .reader .subhead { font-size: 12pt; text-align: center; font-weight: bold; }
    .reader .subsubhead { font-size: 12pt; text-align: center; font-weight: bold; }
    .reader .gatha1 { font-size: 12pt; margin-bottom: 0; margin-left: 4em; }
    .reader .gatha2 { font-size: 12pt; margin-bottom: 0; margin-left: 4em; }
    .reader .gatha3 { font-size: 12pt; margin-bottom: 0; margin-left: 4em; }
    .reader .gathalast { font-size: 12pt; margin-bottom: 0.5cm; margin-left: 4em; }
    .pill.active-lang {
      background: #1f2937;
      color: #f8fafc;
      border-color: #111827;
    }
    .file-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-family: "Monda", "Trebuchet MS", sans-serif;
      font-size: 12px;
      color: #374151;
    }
    .file-name {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 5px 8px;
      cursor: pointer;
      user-select: all;
    }
    .translation-status {
      margin-left: auto;
      color: #4b5563;
      font-size: 11px;
      white-space: nowrap;
    }
    .file-name.empty {
      color: #6b7280;
      cursor: default;
      user-select: none;
    }
    .ko-inline {
      margin: .25em 0 .85em 2.2em;
      padding-left: .7em;
      border-left: 2px solid #cfe0d2;
      color: #184030;
      font-size: .93em;
      line-height: 1.75;
    }
    .ko-inline::before {
      content: "번역";
      display: block;
      font-family: "Monda", "Trebuchet MS", sans-serif;
      font-size: .65em;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #5c6a5d;
      margin-bottom: .2em;
    }
    .ko-inline .ko-num {
      font-family: "Monda", "Trebuchet MS", sans-serif;
      font-weight: 700;
      margin-right: .35em;
      color: #255841;
    }
    .muted { color: var(--muted); font-family: "Monda", "Trebuchet MS", sans-serif; }
    .hidden { display: none; }
    .places-panel {
      position: fixed;
      right: 12px;
      top: 12px;
      width: min(420px, calc(100vw - 24px));
      max-height: calc(100dvh - 24px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffefb;
      box-shadow: var(--shadow);
      padding: 10px;
      z-index: 2000;
    }
    .places-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-family: "Monda", "Trebuchet MS", sans-serif;
    }
    .places-help {
      color: #4b5563;
      font-size: 12px;
      margin-bottom: 8px;
      font-family: "Monda", "Trebuchet MS", sans-serif;
    }
    .places-list { display: grid; gap: 8px; }
    .place-item {
      border: 1px solid #e5ddcd;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      cursor: pointer;
    }
    .place-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .place-kind {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 999px;
      border: 1px solid #b8b09d;
      color: #334155;
      font-family: "Monda", "Trebuchet MS", sans-serif;
    }
    .place-title {
      font-weight: 700;
      font-size: 13px;
      color: #1f2937;
      margin-bottom: 3px;
      overflow-wrap: anywhere;
    }
    .place-meta, .place-quote {
      font-size: 12px;
      color: #4b5563;
      overflow-wrap: anywhere;
      font-family: "Monda", "Trebuchet MS", sans-serif;
    }
    .place-del {
      border: 1px solid #f1c7c7;
      background: #fff1f1;
      color: #7f1d1d;
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      font-family: "Monda", "Trebuchet MS", sans-serif;
    }
    .save-para-btn {
      float: right;
      margin-left: 8px;
      border: 1px solid #d7cfbf;
      background: #f9f6ef;
      color: #516154;
      border-radius: 999px;
      width: 24px;
      height: 24px;
      line-height: 22px;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      font-family: "Monda", "Trebuchet MS", sans-serif;
    }
    .save-para-btn:hover {
      background: #ecf4ed;
      color: #1f4d33;
      border-color: #b9cbbd;
    }
    .save-para-btn.active {
      background: #e6f4e9;
      color: #14532d;
      border-color: #95c9a2;
      font-weight: 700;
    }

    .layout.nav-collapsed { grid-template-columns: 1fr !important; }
    .layout.nav-collapsed .nav-pane { display: none; }
    .layout > div + div { margin-top: 10px; }

    @media (max-width: 699px) {
      .toc { max-height: 40dvh; }
      .toc-head { font-size: 13px; padding-top: 7px; padding-bottom: 7px; }
      .file-btn { font-size: 13px; padding-top: 7px; padding-bottom: 7px; }
    }
    @media (min-width: 700px) {
      .layout { display: grid; grid-template-columns: minmax(0, 290px) minmax(0, 1fr); gap: 12px; }
      .layout > div { min-width: 0; }
      .layout > div + div { margin-top: 0; }
      .toc { max-height: 52dvh; }
      .list { max-height: 22dvh; }
      .reader { max-height: 70dvh; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel" id="readerPanel">
      <div class="bar">
        <button class="pill" id="savePlaceBtn">저장</button>
        <button class="pill" id="openPlacesBtn">저장 지점</button>
        <button class="pill" id="fullscreenBtn">전체화면 보기</button>
      </div>
      <div class="file-meta">
        <span>파일명</span>
        <code class="file-name empty" id="fileNameDisplay">선택된 파일 없음</code>
        <button class="pill" id="copyFileNameBtn" disabled>복사</button>
        <span class="translation-status" id="translationStatus"></span>
      </div>
      <div class="layout" id="layout" style="margin-top:10px">
        <div class="nav-pane">
          <div class="toc-wrap">
            <button class="toc-toggle" id="tocToggle">목차 열기/닫기</button>
            <div class="toc" id="toc"></div>
          </div>
          <div class="list hidden" id="fileList"></div>
        </div>
        <div>
          <div class="reader" id="reader"><p class="muted">목차의 항목을 선택하면 본문이 열립니다.</p></div>
        </div>
      </div>
    </section>
    <aside class="places-panel hidden" id="placesPanel" aria-hidden="true">
      <div class="places-head">
        <strong>저장 지점</strong>
        <button class="pill" id="closePlacesBtn">닫기</button>
      </div>
      <div class="places-help">텍스트 선택 후 저장: 문구 저장, 선택 없이 저장: 현재 단락 북마크</div>
      <div class="places-list" id="placesList"></div>
    </aside>
  </main>

  <script>
    const FIXED_LANG = "romn";
    const KO_LANG = "ko";
    const CONTENT_ROOT = "./data/corpus";
    const TREE_ROOT = "./data/tree";
    const READER_STATE_KEY = "pali_mobile_reader_state_v1";
    const READER_PLACES_KEY = "pali_mobile_reader_places_v1";

    const els = {
      readerPanel: document.getElementById("readerPanel"),
      fileNameDisplay: document.getElementById("fileNameDisplay"),
      copyFileNameBtn: document.getElementById("copyFileNameBtn"),
      translationStatus: document.getElementById("translationStatus"),
      savePlaceBtn: document.getElementById("savePlaceBtn"),
      openPlacesBtn: document.getElementById("openPlacesBtn"),
      placesPanel: document.getElementById("placesPanel"),
      closePlacesBtn: document.getElementById("closePlacesBtn"),
      placesList: document.getElementById("placesList"),
      fullscreenBtn: document.getElementById("fullscreenBtn"),
      layout: document.getElementById("layout"),
      tocToggle: document.getElementById("tocToggle"),
      toc: document.getElementById("toc"),
      fileList: document.getElementById("fileList"),
      reader: document.getElementById("reader")
    };

    let selectedFile = "";
    let selectedSectionLabel = "";
    let selectedHref = "";
    let currentTree = [];
    let selectedViewLang = KO_LANG;
    const koAvailabilityByFile = new Map();
    const koSectionStatusCache = new Map();
    const koFileMergeCache = new Map();
    let places = [];
    let isFullscreenMode = false;
    let persistTimer = null;

    function decodeWithBom(arrayBuffer) {
      const bytes = new Uint8Array(arrayBuffer);
      if (bytes[0] === 0xFF && bytes[1] === 0xFE) {
        return new TextDecoder("utf-16le").decode(bytes);
      }
      if (bytes[0] === 0xFE && bytes[1] === 0xFF) {
        return new TextDecoder("utf-16be").decode(bytes);
      }
      return new TextDecoder("utf-8").decode(bytes);
    }

    function parseTreeText(text) {
      if (!text) return "";
      return String(text).trim().replace(/\s+/g, " ");
    }

    function normKeyText(text) {
      return parseTreeText(String(text || "")).toLowerCase();
    }

    function toItem(type, num, text, idx, extra = "") {
      const n = parseTreeText(num || "");
      const t = parseTreeText(text || "");
      let key = `${type}:i:${idx}`;
      if (type === "p" && n) key = `p:n:${n}`;
      if (type === "head") key = `head:${extra || "x"}:${normKeyText(t)}`;
      return { type, num: n, text: t, key, rend: extra || "" };
    }

    function normalizeSectionLabel(text) {
      return parseTreeText(text || "")
        .toLowerCase()
        .replace(/^\d+\.\s*/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getNodeKeyPart(label, idx) {
      const base = normalizeSectionLabel(label || "");
      if (base) return base;
      return `node-${idx}`;
    }

    function collectOpenTocKeys() {
      return Array.from(document.querySelectorAll(".toc-section[open][data-node-key]"))
        .map((el) => el.dataset.nodeKey || "")
        .filter(Boolean);
    }

    function loadReaderState() {
      try {
        const raw = localStorage.getItem(READER_STATE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        return parsed;
      } catch (_) {
        return null;
      }
    }

    function persistReaderState() {
      try {
        const state = {
          selectedHref: selectedHref || "",
          selectedSectionLabel: selectedSectionLabel || "",
          scrollTop: Math.max(0, Math.floor(els.reader.scrollTop || 0)),
          openTocKeys: collectOpenTocKeys(),
          tocHidden: els.toc.style.display === "none"
        };
        localStorage.setItem(READER_STATE_KEY, JSON.stringify(state));
      } catch (_) {
        // ignore storage failures
      }
    }

    function schedulePersistReaderState() {
      if (persistTimer) clearTimeout(persistTimer);
      persistTimer = setTimeout(() => {
        persistTimer = null;
        persistReaderState();
      }, 180);
    }

    function restoreOpenTocKeys(keys) {
      if (!Array.isArray(keys)) return;
      const keySet = new Set(keys.filter(Boolean));
      const nodes = Array.from(document.querySelectorAll(".toc-section[data-node-key]"));
      nodes.forEach((el) => {
        const key = el.dataset.nodeKey || "";
        el.open = keySet.has(key);
      });
    }

    function loadPlaces() {
      try {
        const raw = localStorage.getItem(READER_PLACES_KEY);
        if (!raw) return [];
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : [];
      } catch (_) {
        return [];
      }
    }

    function persistPlaces() {
      try {
        localStorage.setItem(READER_PLACES_KEY, JSON.stringify(places));
      } catch (_) {
        // ignore
      }
    }

    function fmtDate(ts) {
      const d = new Date(ts || Date.now());
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function makePlaceId() {
      if (typeof crypto !== "undefined" && crypto.randomUUID) return crypto.randomUUID();
      return `p_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function getCurrentTopParagraphEl() {
      const paras = Array.from(els.reader.querySelectorAll('p[data-block="1"]'));
      if (!paras.length) return null;
      const top = Math.max(0, els.reader.scrollTop || 0) + 6;
      for (const p of paras) {
        const pTop = p.offsetTop;
        const pBottom = pTop + p.offsetHeight;
        if (pBottom >= top) return p;
      }
      return paras[paras.length - 1];
    }

    function paragraphInfoFromEl(p) {
      if (!p) return null;
      const num = parseTreeText(p.dataset.num || "");
      const clone = p.cloneNode(true);
      const saveBtns = clone.querySelectorAll(".save-para-btn");
      saveBtns.forEach((b) => b.remove());
      const text = compactText(clone.textContent || "");
      return { num, text, anchor: text.slice(0, 120) };
    }

    function firstSentence(text) {
      const t = compactText(String(text || ""));
      if (!t) return "";
      const m = t.match(/^(.+?[.!?])(\s|$)/);
      if (m && m[1]) return compactText(m[1]);
      if (t.length <= 90) return t;
      return `${t.slice(0, 90)}...`;
    }

    function getKoInlineTextForParagraph(p) {
      if (!p || !p.nextElementSibling) return "";
      const next = p.nextElementSibling;
      if (!next.classList || !next.classList.contains("ko-inline")) return "";
      let txt = compactText(next.textContent || "");
      txt = txt.replace(/^\d+\.\s*/, "");
      return txt;
    }

    function getBookmarkPreviewFromParagraph(p) {
      const ko = getKoInlineTextForParagraph(p);
      if (ko) return { previewText: firstSentence(ko), previewLang: "ko" };
      const info = paragraphInfoFromEl(p);
      const roman = info ? info.text : "";
      return { previewText: firstSentence(roman), previewLang: "romn" };
    }

    function getSelectionContext() {
      const sel = window.getSelection ? window.getSelection() : null;
      if (!sel || sel.rangeCount === 0 || sel.isCollapsed) return null;
      const text = compactText(sel.toString() || "");
      if (!text) return null;
      const range = sel.getRangeAt(0);
      let node = range.startContainer;
      if (!node) return null;
      if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
      if (!node || !node.closest) return null;
      let p = node.closest('p[data-block="1"]');
      if (!p) {
        const ko = node.closest(".ko-inline");
        if (ko && ko.previousElementSibling && ko.previousElementSibling.matches('p[data-block="1"]')) {
          p = ko.previousElementSibling;
        }
      }
      const inReader = node.closest("#reader");
      if (!inReader || !p) return null;
      return { text, p };
    }

    function makePlaceFromCurrent(type, selectedText = "") {
      if (!selectedHref) return null;
      const pEl = getCurrentTopParagraphEl();
      const info = paragraphInfoFromEl(pEl) || { num: "", anchor: "" };
      const preview = getBookmarkPreviewFromParagraph(pEl);
      const quoteText = compactText(selectedText || "");
      const now = Date.now();
      const title = type === "quote"
        ? (quoteText.length > 28 ? `${quoteText.slice(0, 28)}...` : quoteText || "문구")
        : (preview.previewText || "북마크");
      return {
        id: makePlaceId(),
        type,
        title: title || "저장 지점",
        file: selectedFile || toCanonicalSourceFileName(selectedHref),
        href: selectedHref,
        sectionLabel: selectedSectionLabel || "",
        paragraphNum: info.num || "",
        anchorText: info.anchor || "",
        selectedText: quoteText,
        previewText: preview.previewText || "",
        previewLang: preview.previewLang || "romn",
        scrollTop: Math.max(0, Math.floor(els.reader.scrollTop || 0)),
        createdAt: now,
        updatedAt: now
      };
    }

    function makePlaceFromParagraphEl(pEl, type = "bookmark", selectedText = "") {
      if (!selectedHref || !pEl) return null;
      const info = paragraphInfoFromEl(pEl) || { num: "", anchor: "" };
      const preview = getBookmarkPreviewFromParagraph(pEl);
      const quoteText = compactText(selectedText || "");
      const now = Date.now();
      const title = type === "quote"
        ? (quoteText.length > 28 ? `${quoteText.slice(0, 28)}...` : quoteText || "문구")
        : (preview.previewText || "북마크");
      return {
        id: makePlaceId(),
        type,
        title: title || "저장 지점",
        file: selectedFile || toCanonicalSourceFileName(selectedHref),
        href: selectedHref,
        sectionLabel: selectedSectionLabel || "",
        paragraphNum: info.num || "",
        anchorText: info.anchor || "",
        selectedText: quoteText,
        previewText: preview.previewText || "",
        previewLang: preview.previewLang || "romn",
        scrollTop: Math.max(0, Math.floor(els.reader.scrollTop || 0)),
        createdAt: now,
        updatedAt: now
      };
    }

    function addPlace(place) {
      if (!place) return;
      const idx = places.findIndex((p) => {
        if (!p) return false;
        if ((p.type || "") !== (place.type || "")) return false;
        if ((p.href || "") !== (place.href || "")) return false;
        if (normalizeSectionLabel(p.sectionLabel || "") !== normalizeSectionLabel(place.sectionLabel || "")) return false;
        if (parseTreeText(String(p.paragraphNum || "")) !== parseTreeText(String(place.paragraphNum || ""))) return false;
        if ((p.anchorText || "") !== (place.anchorText || "")) return false;
        if ((place.type || "") === "quote") {
          return compactText(p.selectedText || "") === compactText(place.selectedText || "");
        }
        return true;
      });
      if (idx >= 0) {
        places[idx] = { ...places[idx], ...place, id: places[idx].id || place.id, createdAt: places[idx].createdAt || place.createdAt, updatedAt: Date.now() };
        const updated = places[idx];
        places.splice(idx, 1);
        places.unshift(updated);
      } else {
        places.unshift(place);
      }
      if (places.length > 500) places = places.slice(0, 500);
      persistPlaces();
      renderPlacesList();
      syncParagraphSaveButtons();
    }

    async function goToPlace(placeId) {
      const place = places.find((x) => x.id === placeId);
      if (!place || !place.href) return;
      await openFile(place.href, place.sectionLabel || "", { restoreScroll: 0 });
      const num = parseTreeText(place.paragraphNum || "");
      let target = null;
      if (num) {
        target = els.reader.querySelector(`p[data-block="1"][data-num="${CSS.escape(num)}"]`);
      }
      if (!target && place.anchorText) {
        const anchor = place.anchorText.slice(0, 40);
        const paras = Array.from(els.reader.querySelectorAll('p[data-block="1"]'));
        target = paras.find((p) => (p.textContent || "").includes(anchor)) || null;
      }
      if (target) {
        target.scrollIntoView({ block: "center", behavior: "smooth" });
      } else if (Number.isFinite(Number(place.scrollTop))) {
        els.reader.scrollTop = Math.max(0, Number(place.scrollTop));
      }
    }

    function removePlace(placeId) {
      places = places.filter((x) => x.id !== placeId);
      persistPlaces();
      renderPlacesList();
      syncParagraphSaveButtons();
    }

    function isBookmarkedParagraph(href, sectionLabel, num, anchorText) {
      const h = String(href || "");
      const s = normalizeSectionLabel(sectionLabel || "");
      const n = parseTreeText(String(num || ""));
      const a = String(anchorText || "");
      return places.some((p) => {
        if (!p || p.type !== "bookmark") return false;
        if ((p.href || "") !== h) return false;
        if (normalizeSectionLabel(p.sectionLabel || "") !== s) return false;
        if (parseTreeText(String(p.paragraphNum || "")) !== n) return false;
        return (p.anchorText || "") === a;
      });
    }

    function syncParagraphSaveButtons() {
      const paras = Array.from(els.reader.querySelectorAll('p[data-block="1"]'));
      paras.forEach((p) => {
        const btn = p.querySelector(".save-para-btn");
        if (!btn) return;
        const info = paragraphInfoFromEl(p) || { num: "", anchor: "" };
        const on = isBookmarkedParagraph(selectedHref, selectedSectionLabel, info.num, info.anchor);
        btn.classList.toggle("active", on);
        btn.textContent = on ? "★" : "☆";
        btn.title = on ? "단락 북마크 해제" : "단락 저장하기";
        btn.setAttribute("aria-label", btn.title);
      });
    }

    function renderPlacesList() {
      if (!places.length) {
        els.placesList.innerHTML = '<div class="muted">저장된 항목이 없습니다.</div>';
        return;
      }
      els.placesList.innerHTML = places.map((p) => {
        const kind = p.type === "quote" ? "문구" : "북마크";
        const isBookmark = p.type === "bookmark";
        const titleRaw = isBookmark
          ? (p.previewText || p.anchorText || p.title || "북마크")
          : (p.title || "문구");
        const paraMeta = p.paragraphNum ? `단락 ${escapeHtml(String(p.paragraphNum))}` : "";
        const meta = `${paraMeta}${p.sectionLabel ? `${paraMeta ? " · " : ""}${escapeHtml(p.sectionLabel)}` : ""}`;
        const quote = p.selectedText ? `<div class="place-quote">${escapeHtml(p.selectedText)}</div>` : "";
        return `
          <div class="place-item" data-place-id="${escapeHtml(p.id)}">
            <div class="place-top">
              <span class="place-kind">${kind}</span>
              <button class="place-del" data-place-del="${escapeHtml(p.id)}">삭제</button>
            </div>
            <div class="place-title">${escapeHtml(titleRaw)}</div>
            <div class="place-meta">${meta}</div>
            ${quote}
            <div class="place-meta">${escapeHtml(fmtDate(p.updatedAt || p.createdAt))}</div>
          </div>
        `;
      }).join("");
    }

    function openPlacesPanel() {
      els.placesPanel.classList.remove("hidden");
      els.placesPanel.setAttribute("aria-hidden", "false");
      renderPlacesList();
    }

    function closePlacesPanel() {
      els.placesPanel.classList.add("hidden");
      els.placesPanel.setAttribute("aria-hidden", "true");
    }

    function filterBlocksBySection(items, sectionLabel) {
      if (!Array.isArray(items) || !items.length || !sectionLabel) return items;
      const target = normalizeSectionLabel(sectionLabel);
      if (!target) return items;

      const start = items.findIndex(
        (x) => x && x.type === "head" && normalizeSectionLabel(x.text) === target
      );
      if (start < 0) return items;

      // Keep front-matter (e.g. Namo tassa, Nikaya/Book headers) when the selected
      // section is the first chapter in the document, matching tipitaka-xml behavior.
      const firstChapterIndex = items.findIndex(
        (x) => x && x.type === "head" && x.rend === "chapter"
      );
      const includeLeading = firstChapterIndex >= 0 && start === firstChapterIndex;

      let end = items.length;
      for (let i = start + 1; i < items.length; i += 1) {
        const it = items[i];
        if (!it || it.type !== "head") continue;
        if (it.rend === "chapter") {
          end = i;
          break;
        }
      }
      return includeLeading ? items.slice(0, end) : items.slice(start, end);
    }

    function mapHrefToCorpusPath(href) {
      if (!href || !href.toLowerCase().endsWith(".xml")) return "";
      let p = String(href).trim().replace(/^\/+/, "");
      p = p.replace(/^\.\//, "");
      return p;
    }

    function nodeMatchesFilter(node, q) {
      if (!q) return true;
      const txt = parseTreeText(node.text || "").toLowerCase();
      const href = (node.a_attr && node.a_attr.href ? node.a_attr.href : "").toLowerCase();
      if (txt.includes(q) || href.includes(q)) return true;
      if (Array.isArray(node.children)) {
        return node.children.some((child) => nodeMatchesFilter(child, q));
      }
      return false;
    }

    function getFileName(path) {
      return String(path || "").split("/").pop() || "";
    }

    function toCanonicalSourceFileName(path) {
      const fileName = getFileName(path);
      if (!fileName) return "";
      return fileName.replace(/(\.[a-z]+)\d+\.xml$/i, "$1.xml");
    }

    function updateFileNameDisplay() {
      const fileName = selectedFile || "";
      if (!fileName) {
        els.fileNameDisplay.textContent = "선택된 파일 없음";
        els.fileNameDisplay.classList.add("empty");
        els.copyFileNameBtn.disabled = true;
        return;
      }
      els.fileNameDisplay.textContent = fileName;
      els.fileNameDisplay.classList.remove("empty");
      els.copyFileNameBtn.disabled = false;
    }

    async function copySelectedFileName() {
      if (!selectedFile) return;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(selectedFile);
        } else {
          const ta = document.createElement("textarea");
          ta.value = selectedFile;
          ta.setAttribute("readonly", "");
          ta.style.position = "absolute";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }
        els.copyFileNameBtn.textContent = "복사됨";
        setTimeout(() => {
          els.copyFileNameBtn.textContent = "복사";
        }, 800);
      } catch (_) {
        els.copyFileNameBtn.textContent = "실패";
        setTimeout(() => {
          els.copyFileNameBtn.textContent = "복사";
        }, 800);
      }
    }

    function getKoCorpusPath(path) {
      return getFileName(path);
    }

    function buildKoCandidatePaths(path) {
      const raw = String(path || "").trim().replace(/^\/+/, "");
      const fileName = getFileName(raw);
      const out = [];
      if (raw) out.push(raw);
      if (fileName && !out.includes(fileName)) out.push(fileName);
      const normalized = fileName.replace(/(\.[a-z]+)\d+\.xml$/i, "$1.xml");
      if (normalized && !out.includes(normalized)) out.push(normalized);
      return out;
    }

    async function headOk(url) {
      try {
        const res = await fetch(url, { method: "HEAD" });
        return res.ok;
      } catch (_) {
        return false;
      }
    }

    async function probeKoTranslation(path) {
      const fileName = getFileName(path).toLowerCase();
      if (!fileName) return false;
      if (koAvailabilityByFile.has(fileName)) {
        return koAvailabilityByFile.get(fileName) === true;
      }
      const candidates = buildKoCandidatePaths(path);
      for (const relPath of candidates) {
        const ok = await headOk(`${CONTENT_ROOT}/${KO_LANG}/${relPath}`);
        if (ok) {
          koAvailabilityByFile.set(fileName, true);
          return true;
        }
      }
      koAvailabilityByFile.set(fileName, false);
      return false;
    }

    function setKoBadgeState(btn, state) {
      btn.classList.remove("ko-full", "ko-partial");
      if (state === "full") btn.classList.add("ko-full");
      if (state === "partial") btn.classList.add("ko-partial");
    }

    async function loadMergedItemsForPath(path) {
      const key = mapHrefToCorpusPath(path);
      if (!key) return { ok: false, mergedItems: [] };
      if (koFileMergeCache.has(key)) return koFileMergeCache.get(key);

      const promise = (async () => {
        const hasKo = await probeKoTranslation(key);
        const romanUrl = `${CONTENT_ROOT}/${FIXED_LANG}/${key}`;
        const romnRes = await fetch(romanUrl);
        if (!romnRes.ok) return { ok: false, mergedItems: [] };
        const romnBuf = await romnRes.arrayBuffer();
        const romnXml = decodeWithBom(romnBuf);
        const romnBlocks = parseXmlBlocks(romnXml);
        if (romnBlocks.error) return { ok: false, mergedItems: [] };
        if (!hasKo) return { ok: true, mergedItems: romnBlocks.items };

        const koCandidates = buildKoCandidatePaths(key);
        let pathInKo = koCandidates[0] || getKoCorpusPath(key);
        for (const relPath of koCandidates) {
          const ok = await headOk(`${CONTENT_ROOT}/${KO_LANG}/${relPath}`);
          if (ok) {
            pathInKo = relPath;
            break;
          }
        }
        const koRes = await fetch(`${CONTENT_ROOT}/${KO_LANG}/${pathInKo}`);
        if (!koRes.ok) return { ok: true, mergedItems: romnBlocks.items };
        const koBuf = await koRes.arrayBuffer();
        const koXml = decodeWithBom(koBuf);
        let koBlocks = parseXmlBlocks(koXml);
        if (koBlocks.error) koBlocks = parseXmlFragmentBlocks(koXml);
        if (koBlocks.error) koBlocks = parseLooseBlocks(koXml);
        if (koBlocks.error) return { ok: true, mergedItems: romnBlocks.items };

        const merged = mergeKoIntoRoman(romnBlocks.items, koBlocks.items || []);
        return { ok: true, mergedItems: merged.items };
      })();

      koFileMergeCache.set(key, promise);
      return promise;
    }

    async function computeKoSectionStatus(path, sectionLabel) {
      const p = mapHrefToCorpusPath(path);
      const sec = normalizeSectionLabel(sectionLabel || "");
      const key = `${p}::${sec}`;
      if (koSectionStatusCache.has(key)) return koSectionStatusCache.get(key);

      const loaded = await loadMergedItemsForPath(p);
      if (!loaded.ok) {
        koSectionStatusCache.set(key, "none");
        return "none";
      }
      const scoped = filterBlocksBySection(loaded.mergedItems, sectionLabel || "");
      const stats = getTranslationStats(scoped);
      let state = "none";
      if (stats.total > 0) {
        if (stats.translated === 0) state = "none";
        else if (stats.translated >= stats.total) state = "full";
        else state = "partial";
      } else if (scoped.some((x) => x && x.koText)) {
        state = "partial";
      }
      koSectionStatusCache.set(key, state);
      return state;
    }

    function updateLanguageControls() {
      if (selectedViewLang !== KO_LANG && selectedViewLang !== FIXED_LANG) {
        selectedViewLang = KO_LANG;
      }
    }

    async function fillKoBadgesForDirectFiles(container) {
      if (!container) return;
      const directChildren = Array.from(container.children || []);
      for (const el of directChildren) {
        if (!el.matches || !el.matches(".file-btn[data-href]")) continue;
        if (el.dataset.koStateReady === "1") continue;
        try {
          const state = await computeKoSectionStatus(el.dataset.href || "", el.dataset.sectionLabel || "");
          if (!el.isConnected) continue;
          setKoBadgeState(el, state);
          el.dataset.koStateReady = "1";
        } catch (_) {
          if (!el.isConnected) continue;
          setKoBadgeState(el, "none");
          el.dataset.koStateReady = "1";
        }
      }
    }

    function renderTreeNodes(nodes, container, q, depth, parentNodeKey = "root") {
      nodes.forEach((node, idx) => {
        if (!nodeMatchesFilter(node, q)) return;
        const children = Array.isArray(node.children) ? node.children : [];
        const href = node.a_attr && node.a_attr.href ? node.a_attr.href : "";
        const mappedPath = mapHrefToCorpusPath(href);
        const label = parseTreeText(node.text || "Untitled");
        const nodeKey = `${parentNodeKey}/${getNodeKeyPart(label, idx)}`;

        if (children.length) {
          const details = document.createElement("details");
          details.className = "toc-section";
          details.dataset.nodeKey = nodeKey;
          details.open = Boolean(q);
          const summary = document.createElement("summary");
          summary.className = "toc-head";
          summary.textContent = label;
          details.appendChild(summary);
          const body = document.createElement("div");
          body.className = "toc-files toc-children";
          renderTreeNodes(children, body, q, depth + 1, nodeKey);
          details.appendChild(body);
          details.addEventListener("toggle", () => {
            if (details.open) fillKoBadgesForDirectFiles(body);
            schedulePersistReaderState();
          });
          container.appendChild(details);
        } else {
          const btn = document.createElement("button");
          btn.className = "file-btn";
          btn.dataset.href = mappedPath;
          btn.dataset.sectionLabel = label;
          if (mappedPath && mappedPath === selectedHref) btn.classList.add("active");
          btn.textContent = mappedPath ? label : `${label} (원본 링크 없음)`;
          btn.disabled = !mappedPath;
          if (mappedPath) {
            btn.addEventListener("click", () => openFile(mappedPath, label));
          }
          container.appendChild(btn);
        }
      });
    }

    function setSelectedTocKoState(state) {
      const btn = els.toc.querySelector(`.file-btn[data-href="${CSS.escape(selectedHref || "")}"]`);
      if (!btn) return;
      setKoBadgeState(btn, state);
      btn.dataset.koStateReady = "1";
    }

    function ensureSelectedTocVisible() {
      if (!selectedHref) return;
      const btn = els.toc.querySelector(`.file-btn[data-href="${CSS.escape(selectedHref)}"]`);
      if (!btn) return;
      let cur = btn.parentElement;

        cur = cur.parentElement;

    function renderToc(treeNodes) {
      els.toc.innerHTML = "";
      if (!Array.isArray(treeNodes) || !treeNodes.length) {
        els.toc.innerHTML = '<div class="file-btn">표시할 목차가 없습니다.</div>';

    function updateActiveTocNode() {
      const btns = els.toc.querySelectorAll(".file-btn[data-href]");
      btns.forEach((btn) => {
        if (btn.dataset.href === selectedHref) btn.classList.add("active");

    async function loadLanguageTree(langId) {
      try {
        const res = await fetch(`${TREE_ROOT}/${langId}/tree.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const buf = await res.arrayBuffer();
        const text = decodeWithBom(buf);
        const data = JSON.parse(text);
        currentTree = Array.isArray(data) ? data : [];
      } catch (err) {
        currentTree = [];
        els.toc.innerHTML = `<div class="file-btn">원본 tree.json 로드 실패: ${escapeHtml(String(err.message || err))}</div>`;
      }
    }

    function nodeToText(node) {
      if (node.nodeType === Node.TEXT_NODE) return node.nodeValue || "";
      if (node.nodeType !== Node.ELEMENT_NODE) return "";
      const tag = node.tagName.toLowerCase();
      if (tag === "pb") return "";
      if (tag === "note") {
        let note = "";
        node.childNodes.forEach((c) => { note += nodeToText(c); });
        note = compactText(note);
        return note ? ` [${note}] ` : "";
      }
      if (tag === "lb") return "\n";
      let out = "";
      node.childNodes.forEach((c) => { out += nodeToText(c); });
      return out;
    }

    function nodeToHtml(node) {
      if (node.nodeType === Node.TEXT_NODE) return escapeHtml(node.nodeValue || "");
      if (node.nodeType !== Node.ELEMENT_NODE) return "";
      const tag = node.tagName.toLowerCase();
      if (tag === "pb") {
        const ed = escapeHtml(node.getAttribute("ed") || "");
        const n = escapeHtml(node.getAttribute("n") || "");
        if (!ed && !n) return "";
        return `<a name="${ed}${n}"></a>`;
      }
      if (tag === "lb") return "<br>";

      let children = "";
      node.childNodes.forEach((c) => { children += nodeToHtml(c); });

      if (tag === "note") return `<span class="note">[${children}]</span>`;
      if (tag === "hi") {
        const rend = (node.getAttribute("rend") || "").toLowerCase();
        if (rend === "bold") return `<span class="bld">${children}</span>`;
        if (rend === "paranum") return `<span class="paranum">${children}</span>`;
        if (rend === "dot") return children;
      }
      return children;
    }

    function getRendClass(tag, rend) {
      const r = String(rend || "").toLowerCase();
      if (r === "centre" || r === "center") return "centered";
      if (r === "bodytext") return "bodytext";
      if (r === "hangnum") return "hangnum";
      if (r === "unindented") return "unindented";
      if (r === "indent") return "indent";
      if (r === "book") return "book";
      if (r === "chapter") return "chapter";
      if (r === "subhead") return "subhead";
      if (r === "subsubhead") return "subsubhead";
      if (r === "nikaya") return "nikaya";
      if (r === "title") return "title";
      if (r === "gatha1") return "gatha1";
      if (r === "gatha2") return "gatha2";
      if (r === "gatha3") return "gatha3";
      if (r === "gathalast") return "gathalast";
      if (tag === "head") return "chapter";
      if (tag === "trailer") return "centered";
      return "bodytext";
    }

    function buildBlockFromNode(node, idx) {
      if (!node || node.nodeType !== Node.ELEMENT_NODE) return null;
      const tag = node.tagName.toLowerCase();
      const rend = node.getAttribute("rend") || "";
      const transAttr = (node.getAttribute("trans") || "").toLowerCase();
      const trans = transAttr === "true";
      const html = compactText(nodeToHtml(node)).replace(/\s*<br>\s*/g, "<br>");
      const plain = compactText(nodeToText(node));
      if (!plain) return null;
      const cls = getRendClass(tag, rend);

      if (tag === "head") {
        return { type: "head", num: "", text: plain, key: `head:${idx}`, rend, cls, html, trans };
      }

      if (tag === "trailer") {
        return { type: "trailer", num: "", text: plain, key: `trailer:${idx}`, rend, cls, html, trans };
      }

      const { num, text } = normalizeParagraph(node);
      return { type: "p", num, text, key: num ? `p:n:${num}` : `p:i:${idx}`, rend, cls, html, trans };
    }

    function compactText(text) {
      return text
        .replace(/[ \t\r\f\v]+/g, " ")
        .replace(/\n+/g, "\n")
        .replace(/\s+\n/g, "\n")
        .replace(/\n\s+/g, "\n")
        .trim();
    }

    function normalizeParagraph(node) {
      const raw = compactText(nodeToText(node));
      if (!raw) return { num: "", text: "" };
      let num = node.getAttribute("n") || "";
      if (!num) {
        const nHi = node.querySelector("hi[rend='paranum']");
        if (nHi) num = compactText(nodeToText(nHi));
      }
      let text = raw;
      if (num) {
        const escaped = num.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        text = text.replace(new RegExp(`^${escaped}\\s*\\.?\\s*`), "");
      }
      return { num: compactText(num), text: compactText(text) };
    }

    function blocksToReaderHtml(items) {
      function formatKoInlineText(text) {
        if (!text) return "";
        const escaped = escapeHtml(text).replaceAll("\n", "<br>");
        return escaped.replace(/\[([^\]]+)\]/g, '<span class="note">[$1]</span>');
      }
      const parts = [];
      items.forEach((b, idx) => {
        const safe = b.html || escapeHtml(b.text).replaceAll("\n", "<br>");
        const koSafe = b.koText ? formatKoInlineText(b.koText) : "";
        const koNumSafe = b.koNum ? escapeHtml(String(b.koNum)) : "";
        const numAttr = b.num ? ` data-num="${escapeHtml(String(b.num))}"` : "";
        const saveBtn = b.type === "p"
          ? `<button class="save-para-btn" data-save-idx="${idx}" title="단락 저장하기" aria-label="단락 저장하기">☆</button>`
          : "";
        parts.push(`<p class="${escapeHtml(b.cls || "bodytext")}" data-block="1" data-idx="${idx}"${numAttr}>${saveBtn}${safe}</p>`);
        if (koSafe) {
          const koNumHtml = koNumSafe ? `<span class="ko-num">${koNumSafe}.</span>` : "";
          parts.push(`<div class="ko-inline">${koNumHtml}${koSafe}</div>`);
        }
      });
      if (!parts.length) {
        return '<p class="muted">본문을 추출하지 못했습니다. (원본 XML 구조 확인 필요)</p>';
      }
      return parts.join("\n");
    }

    function xmlToReaderHtml(xmlText) {
      const blocks = parseXmlBlocks(xmlText);
      if (blocks.error) return blocks.error;
      return blocksToReaderHtml(blocks.items);
    }

    function parseXmlBlocks(xmlText) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "application/xml");
      if (xml.querySelector("parsererror")) {
        return { error: '<p class="muted">XML 파싱 실패: 원문 인코딩/형식을 확인하세요.</p>', items: [] };
      }

      const items = [];

      const bodyNodes = xml.querySelectorAll("text body > p, text body > head, text body > trailer, text body div > p, text body div > head, text body div > trailer");
      bodyNodes.forEach((node) => {
        const item = buildBlockFromNode(node, items.length);
        if (item) items.push(item);
      });
      return { error: "", items };
    }

    function parseXmlFragmentBlocks(xmlText) {
      const parser = new DOMParser();
      const wrapped = `<root>${xmlText}</root>`;
      const xml = parser.parseFromString(wrapped, "application/xml");
      if (xml.querySelector("parsererror")) {
        return { error: '<p class="muted">XML 파싱 실패: 원문 인코딩/형식을 확인하세요.</p>', items: [] };
      }
      const items = [];
      const nodes = xml.querySelectorAll("p, head, trailer");
      nodes.forEach((node) => {
        const item = buildBlockFromNode(node, items.length);
        if (item) items.push(item);
      });
      return { error: "", items };
    }

    function parseLooseBlocks(xmlText) {
      const items = [];
      if (!xmlText) return { error: '<p class="muted">본문을 추출하지 못했습니다. (원본 XML 구조 확인 필요)</p>', items };
      const re = /<(head|p|trailer)\b[^>]*>[\s\S]*?<\/\1>/gi;
      const blocks = String(xmlText).match(re) || [];
      blocks.forEach((block) => {
        const parser = new DOMParser();
        const wrapped = `<root>${block}</root>`;
        const xml = parser.parseFromString(wrapped, "application/xml");
        if (xml.querySelector("parsererror")) return;
        const node = xml.documentElement.firstElementChild;
        const item = buildBlockFromNode(node, items.length);
        if (item) items.push(item);
      });
      if (!items.length) {
        return { error: '<p class="muted">본문을 추출하지 못했습니다. (원본 XML 구조 확인 필요)</p>', items: [] };
      }
      return { error: "", items };
    }

    function hasParaNum(item) {
      if (!item || item.type !== "p") return false;
      const raw = parseTreeText(String(item.num || ""));
      if (!raw) return false;
      return /^\d+/.test(raw);
    }

    function mergeKoIntoRoman(romanItems, koItems) {
      if (!Array.isArray(romanItems) || !romanItems.length) return { items: koItems || [], translated: 0, total: 0 };
      if (!Array.isArray(koItems) || !koItems.length) {
        const total = romanItems.filter((x) => x.type === "p" && hasParaNum(x)).length;
        return { items: romanItems, translated: 0, total };
      }

      let translated = 0;
      let total = 0;
      const out = romanItems.map((r, idx) => {
        if (!r) return r;
        if (r.type === "p" && hasParaNum(r)) total += 1;

        const k = koItems[idx];
        if (!k) return r;
        if ((k.type || "") !== (r.type || "")) return r;
        if ((k.rend || "") !== (r.rend || "")) return r;

        if (k.trans !== true || !k.text) return r;

        if (r.type === "p" && hasParaNum(r)) translated += 1;
        return { ...r, koText: k.text, koNum: k.num || "" };
      });
      return { items: out, translated, total };
    }

    function escapeHtml(s) {
      return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getTranslationStats(items) {
      const list = Array.isArray(items) ? items : [];
      const total = list.filter((x) => hasParaNum(x)).length;
      const translated = list.filter((x) => hasParaNum(x) && x.koText).length;
      return { translated, total };
    }

    async function openFile(file, sectionLabel = "", opts = {}) {
      els.reader.innerHTML = '<p class="muted">불러오는 중...</p>';
      try {
        selectedFile = toCanonicalSourceFileName(file);
        selectedSectionLabel = sectionLabel || selectedSectionLabel || "";
        selectedHref = file;
        updateFileNameDisplay();
        const canUseKo = await probeKoTranslation(file);
        const viewLang = (selectedViewLang === KO_LANG && canUseKo) ? KO_LANG : FIXED_LANG;
        updateActiveTocNode();
        ensureSelectedTocVisible();
        updateLanguageControls();
        if (!canUseKo) setSelectedTocKoState("none");
        const romanUrl = `${CONTENT_ROOT}/${FIXED_LANG}/${file}`;
        let pathInLang = file;
        if (viewLang === KO_LANG) {
          const koCandidates = buildKoCandidatePaths(file);
          pathInLang = koCandidates[0] || getKoCorpusPath(file);
          for (const relPath of koCandidates) {
            const ok = await headOk(`${CONTENT_ROOT}/${KO_LANG}/${relPath}`);
            if (ok) {
              pathInLang = relPath;
              break;
            }
          }
        }
        const url = `${CONTENT_ROOT}/${viewLang}/${pathInLang}`;
        if (viewLang === KO_LANG) {
          const [koRes, romnRes] = await Promise.all([fetch(url), fetch(romanUrl)]);
          if (!romnRes.ok) throw new Error(`ROMN HTTP ${romnRes.status}`);
          const romnBuf = await romnRes.arrayBuffer();
          const romnXml = decodeWithBom(romnBuf);
          const romnBlocks = parseXmlBlocks(romnXml);
          if (romnBlocks.error) {
            els.reader.innerHTML = romnBlocks.error;
            return;
          }
          const scopedRomnItems = filterBlocksBySection(romnBlocks.items, selectedSectionLabel);

          if (!koRes.ok) {
            els.translationStatus.textContent = "번역 매칭 0/" + scopedRomnItems.filter((x) => x.type === "p").length;
            els.reader.innerHTML = blocksToReaderHtml(scopedRomnItems);
            setSelectedTocKoState("none");
          } else {
            const koBuf = await koRes.arrayBuffer();
            const koXml = decodeWithBom(koBuf);
            let koBlocks = parseXmlBlocks(koXml);
            if (koBlocks.error) {
              koBlocks = parseXmlFragmentBlocks(koXml);
            }
            if (koBlocks.error) {
              koBlocks = parseLooseBlocks(koXml);
            }
            if (koBlocks.error) {
              els.translationStatus.textContent = "번역 파싱 실패 (원문 표시)";
              els.reader.innerHTML = blocksToReaderHtml(scopedRomnItems);
              setSelectedTocKoState("none");
            } else {
              const mergedFull = mergeKoIntoRoman(romnBlocks.items, koBlocks.items || []);
              const scopedMergedItems = filterBlocksBySection(mergedFull.items, selectedSectionLabel);
              const stats = getTranslationStats(scopedMergedItems);
              els.translationStatus.textContent = `번역 매칭 ${stats.translated}/${stats.total}`;
              els.reader.innerHTML = blocksToReaderHtml(scopedMergedItems);
              let state = "none";
              if (stats.total > 0) {
                if (stats.translated === 0) state = "none";
                else if (stats.translated >= stats.total) state = "full";
                else state = "partial";
              } else if (scopedMergedItems.some((x) => x && x.koText)) {
                state = "partial";
              }
              setSelectedTocKoState(state);
            }
          }
        } else {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const buf = await res.arrayBuffer();
          const xmlText = decodeWithBom(buf);
          const blocks = parseXmlBlocks(xmlText);
          if (blocks.error) {
            els.reader.innerHTML = blocks.error;
            return;
          }
          const body = blocksToReaderHtml(filterBlocksBySection(blocks.items, selectedSectionLabel));
          els.reader.innerHTML = body;
          els.translationStatus.textContent = "";
          setSelectedTocKoState("none");
        }
        const restoreScroll = Number(opts && opts.restoreScroll);
        if (Number.isFinite(restoreScroll) && restoreScroll >= 0) {
          els.reader.scrollTop = restoreScroll;
        } else {
          els.reader.scrollTop = 0;
        }
        syncParagraphSaveButtons();
        schedulePersistReaderState();
      } catch (err) {
        els.reader.innerHTML = `<p class="muted">파일 로드 실패: ${escapeHtml(String(err.message || err))}</p>`;
      }
    }

    async function init() {
      await loadLanguageTree(FIXED_LANG);
      renderToc(currentTree);
      updateFileNameDisplay();
      updateLanguageControls();
      places = loadPlaces();
      renderPlacesList();

      const restored = loadReaderState();
      if (restored && restored.tocHidden) {
        els.toc.style.display = "none";
      }
      if (restored && Array.isArray(restored.openTocKeys)) {
        restoreOpenTocKeys(restored.openTocKeys);
      }
      if (restored && restored.selectedHref) {
        await openFile(
          restored.selectedHref,
          restored.selectedSectionLabel || "",
          { restoreScroll: Number(restored.scrollTop) || 0 }
        );
      }

      els.copyFileNameBtn.addEventListener("click", () => {
        copySelectedFileName();
      });

      els.fileNameDisplay.addEventListener("click", () => {
        if (!selectedFile) return;
        copySelectedFileName();
      });

      els.tocToggle.addEventListener("click", () => {
        const hidden = els.toc.style.display === "none";
        els.toc.style.display = hidden ? "block" : "none";
        schedulePersistReaderState();
      });

      els.savePlaceBtn.addEventListener("click", () => {
        if (!selectedHref) return;
        const selCtx = getSelectionContext();
        if (selCtx && selCtx.text) {
          const info = paragraphInfoFromEl(selCtx.p) || { num: "", anchor: "" };
          const place = makePlaceFromCurrent("quote", selCtx.text);
          if (place) {
            place.paragraphNum = info.num || place.paragraphNum;
            place.anchorText = info.anchor || place.anchorText;
            addPlace(place);
            if (window.getSelection) {
              const sel = window.getSelection();
              if (sel) sel.removeAllRanges();
            }
          }
        } else {
          addPlace(makePlaceFromCurrent("bookmark", ""));
        }
      });

      els.openPlacesBtn.addEventListener("click", () => {
        openPlacesPanel();
      });
      els.closePlacesBtn.addEventListener("click", () => {
        closePlacesPanel();
      });
      els.placesList.addEventListener("click", async (ev) => {
        const t = ev.target;
        if (!(t instanceof HTMLElement)) return;
        const delId = t.getAttribute("data-place-del");
        if (delId) {
          ev.stopPropagation();
          removePlace(delId);
          return;
        }
        const item = t.closest(".place-item[data-place-id]");
        if (!item) return;
        const pid = item.getAttribute("data-place-id");
        if (!pid) return;
        closePlacesPanel();
        await goToPlace(pid);
      });

      els.reader.addEventListener("click", (ev) => {
        const t = ev.target;
        if (!(t instanceof HTMLElement)) return;
        const btn = t.closest(".save-para-btn");
        if (!btn) return;
        const p = btn.closest('p[data-block="1"]');
        if (!p) return;
        const info = paragraphInfoFromEl(p) || { num: "", anchor: "" };
        const existing = places.find((x) =>
          x &&
          x.type === "bookmark" &&
          (x.href || "") === (selectedHref || "") &&
          normalizeSectionLabel(x.sectionLabel || "") === normalizeSectionLabel(selectedSectionLabel || "") &&
          parseTreeText(String(x.paragraphNum || "")) === parseTreeText(String(info.num || "")) &&
          (x.anchorText || "") === (info.anchor || "")
        );
        if (existing) {
          removePlace(existing.id);
        } else {
          addPlace(makePlaceFromParagraphEl(p, "bookmark", ""));
        }
      });

      function setFullscreenMode(next) {
        isFullscreenMode = Boolean(next);
        document.body.classList.toggle("fullscreen-lock", isFullscreenMode);
        els.readerPanel.classList.toggle("fullscreen-mode", isFullscreenMode);
        els.fullscreenBtn.textContent = isFullscreenMode ? "전체화면 해제" : "전체화면 보기";
      }

      els.fullscreenBtn.addEventListener("click", () => {
        setFullscreenMode(!isFullscreenMode);
      });

      document.addEventListener("keydown", (ev) => {
        if (ev.key === "Escape" && isFullscreenMode) {
          setFullscreenMode(false);
        }
      });

      els.reader.addEventListener("scroll", () => {
        schedulePersistReaderState();
      });

      window.addEventListener("beforeunload", () => {
        persistReaderState();
      });

    }

    init().catch((err) => {
      document.body.innerHTML = `<main class="app"><section class="panel"><p class="muted">초기화 실패: ${String(err.message || err)}</p></section></main>`;
    });
  </script>
</body>
</html>
